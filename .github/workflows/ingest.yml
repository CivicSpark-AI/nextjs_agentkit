name: Nightly Data Ingestion

on:
  schedule:
    # Run at 8:00 AM UTC (2 AM CST / 3 AM CDT)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ingest-ordinances:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ordinance ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INGEST_FILE: ${{ secrets.INGEST_FILE || './data/ordinances.json' }}
        run: npm run ingest
        continue-on-error: true

  ingest-agendas:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run agenda ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AGENDA_URLS: ${{ secrets.AGENDA_URLS }}
        run: npm run ingest:agendas

      - name: Notify on failure
        if: failure()
        run: echo "Agenda ingestion failed. Check logs."

  send-digest:
    runs-on: ubuntu-latest
    needs: [ingest-agendas]
    if: github.event.schedule # Only run on schedule, not manual trigger
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send weekly digest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: npm run send:digest
        # Only run on Mondays
        if: github.event.schedule && contains(github.event.schedule, '1')

